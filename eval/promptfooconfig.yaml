description: OKH E2E in GitHub Copilot CLI
# The judge runs through GitHub Copilot CLI (eval/assertions/judge.ts) — no external
# grader model/API key is used. Each scenario grades via a `judge` javascript assertion.
providers:
  - id: file://provider/copilotProvider.ts
    label: copilot-default
    config:
      model: claude-sonnet-4.5
      timeoutMs: 300000
prompts:
  # Single pass-through prompt (promptfoo's documented default). Each scenario is a
  # test case whose prompt text lives in scenarios/<verb>/<case>/prompt.md and is
  # injected via the `prompt` var (file://). One prompt strategy × 16 test cases keeps
  # the results grid dense (no sparse prompt×test matrix / "Error loading cell").
  - raw: "{{prompt}}"
    label: "OKH scenario prompt"
tests: file://scenarios/*/*/test.yaml