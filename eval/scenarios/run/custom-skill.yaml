# run — dispatch a custom module's own (.claude/skills) skill through the generic runner.
- config:
    - vars:
        env: custom
        prompt: |
          hub, in container "custom-hub", use the "recipes" module's "cook" skill to
          help me make pancakes.
  tests:
    - description: Run - custom module skill - dispatches the module's cook skill
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            expect:
              - name: run
                arguments: { container: custom-hub, module: recipes, skill: cook }
        - type: javascript
          value: file://assertions/transcript.ts
          config:
            source: final-message
            mustContain: [ingredients?, flour, milk, egg, sugar, salt]
