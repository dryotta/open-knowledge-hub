# run — dispatch a module-less shared skill (grilling) through the generic runner.
- config:
    - vars:
        env: empty
        prompt: |
          Use the open-knowledge-hub MCP tools. Run the shared "grilling" skill to
          stress-test my plan to add OAuth login — no container or module needed.
  tests:
    - description: Run - shared grilling skill - module-less run returns grilling discipline
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config: { expect: [run] }
        - type: javascript
          value: file://assertions/judge.ts
          config:
            criteria:
              - id: ran-grilling-skill
                text: The agent invoked the run tool with the shared "grilling" skill and no container/module.
                check: { kind: transcript-contains, pattern: '"skill":\s*"grilling"' }
              - id: followed-grilling
                text: The agent then began grilling the user one question at a time toward a shared understanding before acting.
