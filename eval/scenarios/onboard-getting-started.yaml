# onboard flow — getting started: explain, cold-start phrase, wake phrase (env: empty).
- description: Onboard - explain request - explains OKH and setup
  vars:
    env: empty
    prompt: |
      hub, explain what the Open Knowledge Hub is and how it organizes knowledge,
      and tell me how I'd set up my first hub.
  assert:
    - type: javascript
      value: file://assertions/judge.ts
      config:
        criteria:
          - id: explains-containers-modules
            text: The agent explains OKH as containers of typed modules.
          - id: offers-setup-help
            text: The agent offers to help the user set up or add a first hub.
- description: Onboard - cold-start phrase - runs onboard flow
  vars:
    env: empty
    prompt: |
      Use the Open Knowledge Hub MCP and run onboard to set me up.
  assert:
    - type: javascript
      value: file://assertions/tools-called.ts
      config: { expect: [onboard] }
    - type: javascript
      value: file://assertions/judge.ts
      config:
        criteria:
          - id: called-onboard
            text: The agent called the onboard tool/flow to begin guided setup.
            check: { kind: tool, name: onboard }
          - id: begins-onboarding
            text: The agent begins onboarding — e.g. explains OKH and/or offers to set up a first container.
- description: Onboard - custom name - sets wake phrase
  vars:
    env: empty
    prompt: |
      hub, help me get started. I'd like to call you "brain" from now on.
  assert:
    - type: javascript
      value: file://assertions/tools-called.ts
      config: { expect: [config] }
    - type: javascript
      value: file://assertions/wake-phrase-set.ts
      config: { default: hub }
    - type: javascript
      value: file://assertions/judge.ts
      config:
        criteria:
          - id: explained-onboarding
            text: The agent explained getting started / onboarding.
          - id: set-wake-phrase
            text: The agent set the wake phrase to "brain".
            check: { kind: wake-phrase, default: hub }
          - id: used-config
            text: The agent used the config tool to set the wake phrase.
            check: { kind: tool, name: config }
