- vars:
    scenario: context-includes-skills-tools
    backend: local
    container: kb-hub
    fixture: fixtures/kb-hub
    prompt: |
      Use the open-knowledge-hub MCP tools to assemble a working set for this task
      in container "kb-hub": debug a failing test that parses a CSV file. Inspect
      the relevant modules and include every module type that helps — not just
      knowledge, but any applicable skill and any tool that can do part of the
      work — and cite each selected item by its path.
  assert:
    - type: javascript
      value: file://assertions/tools-called.ts
      config: { expect: [context] }
    - type: javascript
      value: file://assertions/transcript.ts
      config: { mustContain: ["debugging", "csv2json"], mustNotContain: [] }
    - type: javascript
      value: file://assertions/judge.ts
      config:
        threshold: 0.8
        rubric: |
          PASS iff the working set selects the Debugging skill and the csv2json tool
          by path, notes one line on why each matters, and does NOT pad the set with
          the unrelated Auth knowledge concept. FAIL if it returns only knowledge,
          dumps whole files, or omits either the skill or the tool.
