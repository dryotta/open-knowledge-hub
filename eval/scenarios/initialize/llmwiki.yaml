# initialize skill — grill scope, offer templates, and build an empty llmwiki contract/structure.
- config:
    - vars:
        env: wiki
        prompt: |
          Use the open-knowledge-hub MCP tools. In container "wiki-hub", run module
          "new-wiki"'s `initialize` skill and guide me through setting up the wiki.
        turns:
          - id: purpose
            after: start
            when: "purpose|goal|audience|who.*read"
            send: |
              This is an engineering handbook for backend developers and coding agents.
              It should help them understand our systems and make safe changes.
          - id: goals
            after: start
            when: "specific goals|outcomes.*achieve|what.*achieve"
            send: |
              The complete goal is for backend developers and coding agents to understand
              our systems and make safe changes. Continue to the scope boundaries.
          - id: scope
            after: [purpose, goals]
            when: "scope|in.?scope|out.?of.?scope|topics"
            send: |
              In scope: backend components, request flows, architecture decisions, and
              engineering terminology. Out of scope: product roadmaps and customer data.
          - id: template
            after: scope
            when: "structure|template|encyclopedia|di.taxis|topic tree|codebase|custom"
            send: |
              Use the Encyclopedia template: concepts, entities, summaries, and
              syntheses. Use matching singular OKF concept types.
          - id: tags
            after: template
            when: "tag|tagging"
            send: "Skip tags; the group structure and links are enough."
          - id: sources
            after: tags
            when: "source|retain|copies"
            send: "Do not retain source copies."
          - id: scope-confirmed
            after: sources
            send: |
              These decisions are final: build an engineering handbook for backend
              developers and coding agents; cover backend components, request flows,
              architecture decisions, and terminology; exclude product roadmaps and
              customer data; use the Encyclopedia groups and matching singular types;
              use no tags and retain no source copies. Build the empty structure locally
              and show me a diff summary.
          - id: sync-confirmed
            after: scope-confirmed
            send: "Yes, sync those changes now."
        terminal:
          after: sync-confirmed
          requiredTools: [run, sync]
  tests:
    - description: Initialize - llmwiki - grills scope and builds template structure
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            ordered: true
            expect:
              - name: run
                arguments: { container: wiki-hub, module: new-wiki, skill: initialize }
              - name: run
                arguments: { skill: grilling }
              - name: sync
        - type: javascript
          value: file://assertions/llmwiki-state.ts
          config:
            module: new-wiki
            requiredIndexText: [backend developers, product roadmaps, concept, synthesis]
            requiredGroupIndexes: [concepts/index.md, entities/index.md, summaries/index.md, syntheses/index.md]
            noContentPages: true
        - type: javascript
          value: file://assertions/judge.ts
          config:
            artifacts: { module: new-wiki, maxFiles: 10 }
            criteria:
              - id: ran-initialize
                text: The agent invoked the new-wiki module's initialize skill.
                required: false
              - id: used-grilling
                text: The agent invoked the shared grilling skill and gathered decisions one at a time.
                required: false
              - id: offered-template-menu
                text: The agent offered multiple structure templates before the user selected Encyclopedia.
              - id: wrote-scope-contract
                text: The resulting new-wiki/index.md contains the agreed purpose, audience/goals, in-scope topics, out-of-scope topics, and declared concept types.
              - id: built-empty-structure
                text: The resulting module has group index files for concepts, entities, summaries, and syntheses, without invented concept content.
              - id: persisted-via-sync
                text: The initialized wiki was persisted via the sync tool.
                required: false
