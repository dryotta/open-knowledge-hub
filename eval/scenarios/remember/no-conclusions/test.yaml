- description: remember-no-conclusions
  prompts:
    - remember-no-conclusions
  vars:
    scenario: remember-no-conclusions
    backend: local
    container: kb-hub
    fixture: fixtures/kb-hub
  assert:
    - type: javascript
      value: file://assertions/tools-called.ts
      config: { expect: [remember] }
    - type: javascript
      value: file://assertions/memory-append.ts
      config: { module: mem, baselineFileCount: 2 }
    - type: javascript
      value: file://assertions/judge.ts
      config:
        artifacts: { module: mem }
        criteria:
          - id: raw-fact-only
            text: The memory entry (see ON-DISK ARTIFACTS) records the raw fact/result only — a timestamped observation.
          - id: no-conclusions
            text: The entry does NOT synthesize conclusions, lessons, recommendations, or root-cause analysis.
