# remember flow — route a natural request through the memory skill and persist it.
- config:
    - vars:
        env: local-and-git
        prompt: |
          hub, in container "kb-hub"'s memory module, remember that I need to buy
          printer ink by 2026-07-15. It is high priority and labeled shopping.
        terminal:
          after: start
          requiredTools: [run, todos, sync]
          finalTool: sync
  tests:
    - description: Remember - todo - routes, applies, and persists prioritized shopping task
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            ordered: true
            expect:
              - name: run
                arguments: { container: kb-hub, module: mem, skill: remember }
              - name: todos
                arguments: { operation: create, apply: true }
              - name: sync
                arguments: { container: kb-hub }
        - type: javascript
          value: file://assertions/todo-apply-sync.ts
          config: { operation: create, container: kb-hub }
        - type: javascript
          value: file://assertions/todo-markdown.ts
          config:
            module: mem
            text: buy printer ink
            status: open
            labels: [shopping]
            due: "2026-07-15"
            priority: high
        - type: javascript
          value: file://assertions/todo-module-change.ts
          config: { module: mem, operation: create, text: buy printer ink }
