# remember flow — create a confirmed todo-bearing memory entry.
- config:
    - vars:
        env: local-and-git
        prompt: |
          Use the open-knowledge-hub MCP tools. In container "kb-hub", module "mem",
          use the remember skill to remember that I need to buy printer ink by
          2026-07-15. It is high priority and labeled shopping.
        turns:
          - when: '\b(confirm|confirmation|proceed|approve)\b|go ahead|shall i|proposed|proposal|exact proposed|ready to (create|add|save|write)|before i (write|create|add)'
            send: "Yes, I explicitly confirm that exact proposed todo. Go ahead and write it."
  tests:
    - description: Remember - todo - creates confirmed prioritized shopping task
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config: { expect: [run, todos, update_todo, sync] }
        - type: javascript
          value: file://assertions/todo-markdown.ts
          config:
            module: mem
            text: buy printer ink
            status: open
            labels: [shopping]
            due: "2026-07-15"
            priority: high
        - type: javascript
          value: file://assertions/judge.ts
          config:
            artifacts: { module: mem }
            criteria:
              - id: created-confirmed-todo
                text: The on-disk memory contains the confirmed open printer-ink todo with shopping label, 2026-07-15 due date, and high priority.
