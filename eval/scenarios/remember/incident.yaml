# remember flow — append a raw, timestamped observation.
- config:
    - vars:
        env: local-and-git
        prompt: |
          hub, remember this observation in container "kb-hub": "The login endpoint
          returned 500s for ~3 minutes at 14:05 UTC during deploy."
        terminal:
          after: start
          requiredTools: [run, sync]
          finalTool: sync
  tests:
    - description: Remember - incident - appends raw timestamped entry
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            ordered: true
            expect:
              - name: run
                arguments: { container: kb-hub, module: mem, skill: remember }
              - name: sync
                arguments: { container: kb-hub }
        - type: javascript
          value: file://assertions/memory-append.ts
          config:
            module: mem
            observation: "The login endpoint returned 500s for ~3 minutes at 14:05 UTC during deploy."
