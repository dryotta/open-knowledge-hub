# remember flow — store the raw result only, no synthesized conclusions.
- config:
    - vars:
        env: local-and-git
        prompt: |
          hub, remember this in container "kb-hub":
          "Test suite run #42 finished in 13s with 88 passing."
        terminal:
          after: start
          requiredTools: [run, sync]
          finalTool: sync
  tests:
    - description: Remember - test result - stores raw, no conclusions
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            ordered: true
            expect:
              - name: run
                arguments: { container: kb-hub, module: mem, skill: remember }
              - name: sync
                arguments: { container: kb-hub }
        - type: javascript
          value: file://assertions/memory-append.ts
          config:
            module: mem
            observation: "Test suite run #42 finished in 13s with 88 passing."
