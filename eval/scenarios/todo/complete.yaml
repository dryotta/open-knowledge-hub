# todo flow — complete one existing task immediately.
- config:
    - vars:
        env: local-and-git
        prompt: |
          Use the open-knowledge-hub MCP tools. In container "kb-hub", module "mem",
          mark "Buy milk" as complete. Apply the change and sync immediately — do not
          ask for confirmation first.
        terminal:
          after: start
          requiredTools: [todos, sync]
  tests:
    - description: Todo - complete - directly completes only Buy milk and syncs
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config: { expect: [todos, sync] }
        - type: javascript
          value: file://assertions/todo-markdown.ts
          config:
            module: mem
            text: Buy milk
            status: completed
            labels: [shopping]
        - type: javascript
          value: file://assertions/judge.ts
          config:
            artifacts: { module: mem }
            criteria:
              - id: direct-apply-sync
                text: The agent applied the todo completion directly with apply:true in a single todos call and immediately called sync without requesting confirmation.
                check: { kind: todo-apply-sync, operation: update }
              - id: completed-target-only
                text: Only the Buy milk todo was completed; unrelated memory content and the Review launch notes todo remain intact and unchanged.
