# todo flow — complete one existing task immediately.
- config:
    - vars:
        env: local-and-git
        prompt: |
          hub, use the todo workflow in container "kb-hub"'s "mem" memory module
          to mark "Buy milk" as complete.
        terminal:
          after: start
          requiredTools: [run, todos, sync]
          finalTool: sync
  tests:
    - description: Todo - complete - routes and completes only Buy milk
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            ordered: true
            expect:
              - name: run
                arguments: { container: kb-hub, module: mem, skill: todo }
              - name: todos
                arguments: { operation: update, apply: true }
              - name: sync
                arguments: { container: kb-hub }
        - type: javascript
          value: file://assertions/todo-apply-sync.ts
          config: { operation: update, container: kb-hub }
        - type: javascript
          value: file://assertions/todo-markdown.ts
          config:
            module: mem
            text: Buy milk
            status: completed
            labels: [shopping]
        - type: javascript
          value: file://assertions/todo-module-change.ts
          config: { module: mem, operation: update, text: Buy milk }
