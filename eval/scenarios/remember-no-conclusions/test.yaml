- vars:
    scenario: remember-no-conclusions
    backend: local
    container: kb-hub
    fixture: fixtures/kb-hub
    prompt: |
      Use the open-knowledge-hub MCP tools. Remember this in container "kb-hub":
      "Test suite run #42 finished in 13s with 88 passing."
  assert:
    - type: javascript
      value: file://assertions/tools-called.ts
      config: { expect: [remember] }
    - type: javascript
      value: file://assertions/memory-append.ts
      config: { module: mem, baselineFileCount: 2 }
    - type: javascript
      value: file://assertions/judge.ts
      config:
        threshold: 0.8
        artifacts: { module: mem }
        rubric: |
          You are shown the exact memory entry the agent wrote under
          "ON-DISK ARTIFACTS". PASS iff that entry records the raw fact/result
          only — a timestamped observation — and does NOT synthesize
          conclusions, lessons, recommendations, or root-cause analysis (that is
          reflect's job). FAIL if it editorializes or draws conclusions beyond the
          raw fact.