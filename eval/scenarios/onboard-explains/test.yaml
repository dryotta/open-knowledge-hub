- vars:
    scenario: onboard-explains
    backend: local
    provision: empty
    container: hub
    fixture: fixtures/plain-notes
    prompt: |
      hub, what can you do?
  assert:
    - type: javascript
      value: file://assertions/judge.ts
      config:
        threshold: 0.8
        rubric: |
          PASS iff the agent explains OKH as containers of typed modules and offers to
          help the user set up or add a first hub. Naming the management tools
          (inspect/add/sync) or the cognitive flows is a plus but not required.
