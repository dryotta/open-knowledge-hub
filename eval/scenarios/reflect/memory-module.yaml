# reflect flow — surface a recurring pattern across memory entries.
- description: Reflect - memory module - finds pattern, proposes update
  config:
    - vars:
        env: local-and-git
        prompt: |
          Use the open-knowledge-hub MCP tools. Reflect on the memory module of
          container "kb-hub" and produce lessons and proposed updates.
  tests:
    - assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config: { expect: [reflect] }
        - type: javascript
          value: file://assertions/judge.ts
          config:
            criteria:
              - id: identifies-pattern
                text: The reflection identifies the recurring token-refresh / clock-skew pattern across BOTH memory entries (2026-01-01 and 2026-02-15), citing each.
              - id: lesson-and-update
                text: It draws a high-signal lesson from the recurrence and proposes a concrete update.
