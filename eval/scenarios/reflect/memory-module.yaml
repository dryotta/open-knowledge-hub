# reflect flow — surface a recurring pattern across memory entries.
- config:
    - vars:
        env: local-and-git
        prompt: |
          hub, use container "kb-hub"'s "mem" memory module "reflect" skill to produce
          lessons and proposed updates from its entries. Do not apply the updates yet.
  tests:
    - description: Reflect - memory module - finds pattern, proposes update
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            expect:
              - name: run
                arguments: { container: kb-hub, module: mem, skill: reflect }
            forbid: [sync, todos, add_container, add_module]
        - type: javascript
          value: file://assertions/transcript.ts
          config:
            source: final-message
            mustContain:
              - "2026-01-01"
              - "2026-02-15"
              - "clock.?skew|clock.?drift"
              - "60\\s*(?:seconds?|s)"
              - "lesson|pattern|recurr"
              - "proposed? update|recommend|durable knowledge"
        - type: javascript
          value: file://assertions/module-unchanged.ts
          config: { module: mem }
        - type: javascript
          value: file://assertions/module-unchanged.ts
          config: { module: kb }
