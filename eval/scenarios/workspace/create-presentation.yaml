# workspace flow — discover the presentation workspace, create a project, and publish a result.
- config:
    - vars:
        env: workspace
        prompt: |
          hub, start a new presentation project named `q3-launch-readiness` and complete it now.

          Create a concise Markdown deck using only these facts:
          - Launch target: September 15.
          - 42 beta teams; 36 are weekly active.
          - SSO setup averages three days and is the main blocker.
          - The decision is whether to fund guided onboarding or delay launch.

          Include an executive recommendation, an evidence table, risks, next steps, and a
          short source-boundary note. Use this content contract:
          - Make the recommendation conditional analysis: validate guided onboarding, fund
            it only if validation shows it can address SSO setup while preserving the
            September 15 target, and otherwise delay launch.
          - Give the evidence table only `Supplied fact` and `Value` columns. Do not interpret
            the facts in the table.
          - Express risks only as questions about what must be validated. Express next steps
            only as validation actions followed by the funding-or-delay decision.
          - Do not add a year or calculate any value, percentage, ratio, difference, or
            count. In particular, do not derive an inactive-team count.
          - Do not characterize weekly activity as engagement, adoption, readiness, or
            success. Do not call beta teams users or a population.
          - Do not invent or prescribe solution scope, technologies, automation,
            implementation, resources, costs, timelines, thresholds, or effects.
        terminal:
          after: start
          requiredTools: [inspect, run, workspace, sync]
          finalTool: sync
  tests:
    - description: Workspace - discover presentation workspace and publish a new project result
      assert:
        - type: javascript
          value: file://assertions/workspace-discovery.ts
          config:
            containers: [work-hub, personal-hub]
            selected: { container: work-hub, module: presentations }
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            ordered: true
            expect:
              - name: run
                arguments: { container: work-hub, module: presentations, skill: create }
              - name: workspace
                arguments: { operation: get, container: work-hub, module: presentations }
              - name: workspace
                arguments:
                  { operation: create, container: work-hub, module: presentations, project: q3-launch-readiness }
              - name: sync
                arguments: { container: work-hub }
              - name: run
                arguments: { container: work-hub, module: presentations, skill: coordinate }
              - name: workspace
                arguments:
                  { operation: get, container: work-hub, module: presentations, project: q3-launch-readiness }
              - name: workspace
                arguments:
                  { operation: start, container: work-hub, module: presentations, project: q3-launch-readiness }
              - name: workspace
                arguments:
                  { operation: report, container: work-hub, module: presentations, project: q3-launch-readiness, state: succeeded }
              - name: sync
                arguments: { container: work-hub }
            forbid:
              - use_agent
              - name: workspace
                arguments: { operation: intervene }
              - name: workspace
                arguments: { operation: update }
        - type: javascript
          value: file://assertions/workspace-mutations.ts
        - type: javascript
          value: file://assertions/workspace-state.ts
          config: { mode: completed-presentation }
        - type: javascript
          value: file://assertions/git-committed.ts
          config: { minNewCommits: 2 }
        - type: javascript
          value: file://assertions/judge.ts
          config:
            artifacts:
              module: presentations
              extensions: [.md]
              includeTranscript: false
              maxFiles: 10
              maxCharsPerFile: 8000
            criteria:
              - id: factual-fidelity
                text: Grade only the final Markdown deck. Its established factual claims exactly preserve the supplied facts without derived values or an inferred year. Clearly conditional analysis, questions about unknowns, and proposed validation actions are not factual claims and should not be penalized. The deck does not characterize activity as engagement, adoption, readiness, or success; relabel beta teams as users or a population; or prescribe effects, scope, technologies, automation, implementation, resources, costs, timelines, or thresholds.
              - id: decision-ready
                text: The presentation gives a clear, reasoned executive recommendation with useful risks and next steps.
