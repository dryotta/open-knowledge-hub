# workspace flow — discover an investigation workspace, pause, record guidance, and resume the same run.
- config:
    - vars:
        env: workspace
        prompt: |
          hub, investigate the checkout rollout choice as project `checkout-rollout-choice`.

          Compare:
          - Blue/green: $120,000, 30-minute cutover, 5-minute rollback, 2% estimated customer-impacting incident risk.
          - In-place: $70,000, 2-hour cutover, 90-minute rollback, 8% estimated customer-impacting incident risk.

          Before choosing a recommendation, create a durable human checkpoint and ask
          whether cost or reliability should dominate. Do not infer my preference.
          Before asking me, do not stop after creating, reading, or starting the project:
          report the run paused and persist that checkpoint first. After I
          answer, record my guidance, continue the same run, and complete the investigation.
        turns:
          - id: reliability-guidance
            after: [start, checkpoint-reminder]
            when: '(?:checkpoint[\s\S]{0,500}|cost[\s\S]{0,80}(?:reliability|risk)|(?:reliability|risk)[\s\S]{0,80}cost|(?:which|what)[\s\S]{0,100}dominate)[\s\S]{0,200}\?'
            send: |
              Prioritize reliability. Accept the extra $50,000 if it reduces incident risk.
              Record this guidance, continue the existing run, and complete the
              investigation with the cost tradeoff made explicit.
          - id: checkpoint-reminder
            after: start
            send: |
              Continue the requested first phase now. Do not choose a recommendation and
              do not infer my preference. Start or resume the project as needed, report
              the run paused with a durable checkpoint asking whether cost or reliability
              should dominate, persist it, and only then ask me that question.
        terminal:
          after: reliability-guidance
          requiredTools: [inspect, run, workspace, sync]
  tests:
    - description: Workspace - pause for guidance and complete the same investigation run
      assert:
        - type: javascript
          value: file://assertions/workspace-discovery.ts
          config:
            containers: [work-hub, personal-hub]
            selected: { container: work-hub, module: investigations }
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            ordered: true
            expect:
              - name: run
                arguments: { container: work-hub, module: investigations, skill: create }
              - name: workspace
                arguments: { operation: get, container: work-hub, module: investigations }
              - name: workspace
                arguments:
                  { operation: create, container: work-hub, module: investigations, project: checkout-rollout-choice }
              - name: sync
                arguments: { container: work-hub }
              - name: run
                arguments: { container: work-hub, module: investigations, skill: coordinate }
              - name: workspace
                arguments:
                  { operation: start, container: work-hub, module: investigations, project: checkout-rollout-choice }
              - name: workspace
                arguments:
                  { operation: report, container: work-hub, module: investigations, project: checkout-rollout-choice, state: paused }
              - name: sync
                arguments: { container: work-hub }
              - name: workspace
                arguments:
                  { operation: intervene, container: work-hub, module: investigations, project: checkout-rollout-choice, action: guide }
              - name: workspace
                arguments:
                  { operation: report, container: work-hub, module: investigations, project: checkout-rollout-choice, state: succeeded }
              - name: sync
                arguments: { container: work-hub }
            forbid:
              - use_agent
        - type: javascript
          value: file://assertions/workspace-mutations.ts
        - type: javascript
          value: file://assertions/workspace-state.ts
          config: { mode: guided-investigation }
        - type: javascript
          value: file://assertions/git-committed.ts
          config: { minNewCommits: 3 }
        - type: javascript
          value: file://assertions/judge.ts
          config:
            artifacts:
              module: investigations
              maxFiles: 10
              maxCharsPerFile: 8000
            criteria:
              - id: genuine-checkpoint
                text: Before receiving the user's preference, the agent genuinely paused for the requested human checkpoint instead of choosing a recommendation early.
              - id: guidance-shaped-result
                text: The completed investigation materially applies the reliability preference and clearly explains the additional $50,000 cost.
