# ingest flow — a path source into an EXISTING, already-scoped knowledge module that
# retains sources. Captures: resolve the module, read its scope contract, author a
# concept (okf-valid), retain the source under sources/<YYYY-MM>/ (source-retained),
# without re-initializing.
- config:
    - vars:
        env: health
        prompt: |
          hub, use the shared "ingest" skill to ingest ./lab-results.txt into my
          existing Health module.
        turns:
          - id: routing-confirmed
            after: start
            send: |
              The routing plan and candidates look correct. Proceed with ingestion.
        terminal:
          after: routing-confirmed
          requiredTools: [run, sync]
  tests:
    - description: Ingest - existing scoped module - path source, no re-initialize
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            ordered: true
            expect:
              - name: run
                turn: 1
                arguments: { skill: ingest }
              - name: run
                turn: 2
                arguments: { container: health-hub, module: health, skill: learn }
              - name: sync
                turn: 2
                arguments: { container: health-hub }
            forbid:
              - name: run
                arguments: { skill: initialize }
        - type: javascript
          value: file://assertions/okf-valid.ts
          config: { module: health, requireChanged: true }
        - type: javascript
          value: file://assertions/source-retained.ts
          config: { module: health, filename: lab-results.txt }
