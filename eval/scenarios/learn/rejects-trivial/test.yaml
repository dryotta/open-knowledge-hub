- description: learn-rejects-trivial
  vars:
    prompt: file://scenarios/learn/rejects-trivial/prompt.md
    env: local-and-git
  assert:
    - type: javascript
      value: file://assertions/tools-called.ts
      config: { expect: [learn] }
    - type: javascript
      value: file://assertions/module-unchanged.ts
      config: { module: kb }
    - type: javascript
      value: file://assertions/judge.ts
      config:
        criteria:
          - id: rejects-trivial
            text: The okf-learn gate REJECTS "the sky is blue" as not serving any goal and does not write it as a concept.
