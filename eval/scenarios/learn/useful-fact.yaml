# learn flow — integrate a useful fact into the requested knowledge module.
- config:
    - vars:
        env: git
        prompt: |
          hub, in container "git-hub"'s knowledge module, learn this fact:
          "Session tokens are signed with RS256 and the public keys are rotated weekly."
  tests:
    - description: Learn - useful fact - integrates, syncs
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            ordered: true
            expect:
              - name: run
                arguments: { container: git-hub, module: kb, skill: learn }
              - name: sync
                arguments: { container: git-hub }
        - type: javascript
          value: file://assertions/okf-valid.ts
          config:
            module: kb
            requireCitations: false
            requireChanged: true
            requiredChangedPatterns: [RS256, weekly]
        - type: javascript
          value: file://assertions/git-committed.ts
          config: { minCommits: 2 }
