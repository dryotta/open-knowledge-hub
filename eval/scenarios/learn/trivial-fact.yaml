# learn flow — reject a trivial fact; nothing is written.
description: Learn - trivial fact - rejects, no write
providers:
  - file://../shared/provider.ts
prompts:
  - label: learn-trivial-fact
    raw: |
      Use the open-knowledge-hub MCP tools. Learn this into container "kb-hub":
      "The sky is blue on a clear day."
tests:
  - vars:
      env: local-and-git
    prompts:
      - learn-trivial-fact
    assert:
      - type: javascript
        value: file://../../assertions/tools-called.ts
        config: { expect: [learn] }
      - type: javascript
        value: file://../../assertions/module-unchanged.ts
        config: { module: kb }
      - type: javascript
        value: file://../../assertions/judge.ts
        config:
          criteria:
            - id: rejects-trivial
              text: The okf-learn gate REJECTS "the sky is blue" as not serving any goal and does not write it as a concept.
