# learn flow — reject a trivial fact; nothing is written.
- config:
    - vars:
        env: local-and-git
        prompt: |
          hub, use container "kb-hub"'s "kb" knowledge module "learn" skill to decide
          whether this fact is useful enough to store: "The sky is blue on a clear day."
  tests:
    - description: Learn - trivial fact - rejects, no write
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            expect:
              - name: run
                arguments: { container: kb-hub, module: kb, skill: learn }
            forbid: [sync]
        - type: javascript
          value: file://assertions/module-unchanged.ts
          config: { module: kb }
        - type: javascript
          value: file://assertions/module-unchanged.ts
          config: { module: mem }
