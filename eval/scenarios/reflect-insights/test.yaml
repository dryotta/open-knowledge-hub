- vars:
    scenario: reflect-insights
    backend: local
    container: kb-hub
    fixture: fixtures/kb-hub
    prompt: |
      Use the open-knowledge-hub MCP tools. Reflect on the memory module of
      container "kb-hub" and produce lessons and proposed updates.
  assert:
    - type: javascript
      value: file://assertions/tools-called.ts
      config: { expect: [reflect] }
    - type: javascript
      value: file://assertions/judge.ts
      config:
        threshold: 0.8
        rubric: |
          PASS iff the reflection identifies the RECURRING token-refresh / clock-skew
          pattern across BOTH memory entries (2026-01-01 and 2026-02-15), citing each,
          draws a high-signal lesson from the recurrence, and proposes a concrete
          update. FAIL if it only restates a single entry.