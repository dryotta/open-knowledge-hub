# onboard flow — a genuine multi-turn cold-start conversation: the harness plays
# the user, answering each stage (wake phrase → new container → confirm → wrap-up).
# All turns are unguarded (no `when`); `after` state drives the linear conversation.
- config:
    - vars:
        env: empty
        prompt: |
          I just installed Open Knowledge Hub. Help me set it up for the first time.
        turns:
          - id: wake-phrase
            after: start
            send: "Let's call it 'brain'."
          - id: container-choice
            after: wake-phrase
            send: |
              I'd like a brand-new folder called "my-notes" with a knowledge module
              named "kb".
          - id: create-confirmed
            after: container-choice
            send: "The plan looks right. Yes, create it."
          - id: module-purpose
            after: create-confirmed
            send: |
              Use it for concise engineering notes and decisions that I can search
              later. Build that structure now.
          - id: wrap-up
            after: module-purpose
            send: "Thanks — how would I use it day to day?"
        terminal:
          after: wrap-up
          requiredTools: [onboard, config, add_container]
  tests:
    - description: Onboard - cold-start conversation - staged multi-turn setup
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            ordered: true
            expect:
              - { name: onboard, turn: 1 }
              - name: config
                turn: 2
                arguments: { set: { wakePhrase: brain } }
              - { name: add_container, turn: 3 }
              - name: add_container
                turn: 4
                arguments: { create: true }
              - name: add_module
                turn: 4
                arguments: { container: my-notes, path: kb, type: knowledge, create: true }
              - name: run
                turn: 4
                arguments: { container: my-notes, module: kb, skill: initialize }
              - name: sync
                turn: 5
                arguments: { container: my-notes }
            forbid:
              - name: add_container
                turn: 3
                arguments: { create: true }
              - { name: add_module, turn: 3 }
        - type: javascript
          value: file://assertions/wake-phrase-set.ts
        - type: javascript
          value: file://assertions/container-registered.ts
          config: { name: my-notes, backend: local, module: kb }
        - type: javascript
          value: file://assertions/manifest-initialized.ts
          config: { name: my-notes }
        - type: javascript
          value: file://assertions/judge.ts
          config:
            criteria:
              - id: asked-wake-phrase
                text: Early on, the agent explained OKH briefly and asked the user to choose a wake phrase before doing setup.
              - id: showed-everyday-use
                text: The agent closed by showing how to use the hub day to day (e.g. remember/learn/ask examples).
