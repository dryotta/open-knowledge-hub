# ask flow — answer across all registered hubs, citing each module path.
- config:
    - vars:
        env: local-and-git
        prompt: |
          hub, across all my registered hubs, what do we know about authentication and
          session tokens? Cite the module path for each fact.
  tests:
    - description: Ask - across hubs - cites each module path
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config: { expect: [ask] }
        - type: javascript
          value: file://assertions/judge.ts
          config:
            criteria:
              - id: answered-with-citations
                text: The agent answered from the registered knowledge modules with module-path citations.
              - id: spans-hubs
                text: The answer draws on more than one hub where the relevant facts live.
              - id: no-fabrication
                text: >-
                  Supported facts the agent may state as source-backed: (1) authentication uses
                  signed session tokens verified on each request (both knowledge modules); (2)
                  kb-hub additionally says tokens are issued at login, expire after 24 hours, and
                  refresh tokens rotate on use; (3) if the response draws on memory evidence,
                  kb-hub memory reports refresh failures correlated with client clock skew/drift.
                  Coverage-gap statements (acknowledging a topic is not covered) and clearly
                  labeled synthesis or inference are allowed. Fail only if the response presents
                  unsupported technical details (e.g., specific algorithms, timeout values, or
                  implementation specifics not in any fixture) as source-backed known facts.
