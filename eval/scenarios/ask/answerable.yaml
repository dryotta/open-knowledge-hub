# ask flow — answer strictly from a container's knowledge module.
- config:
    - vars:
        env: local-and-git
        prompt: |
          hub, in container "kb-hub", answer strictly from its knowledge module:
          How does auth work? Do not add examples, rationale, or implementation
          details that the module does not state. Cite the source concept path.
  tests:
    - description: Ask - answerable question - grounded answer, cites source
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            expect:
              - ask
              - { name: task, server: "" }
            forbid:
              - { name: task, server: "", arguments: { mode: background } }
        - type: javascript
          value: file://assertions/transcript.ts
          config:
            source: final-message
            mustContain:
              - "session tokens?"
              - "\\bsign(?:ed|ing|ature)\\b"
              - "24[\\s-]*hours?"
              - "(?:refresh tokens?[\\s\\S]{0,40}rotat|rotat\\w*[\\s\\S]{0,40}refresh tokens?)"
              - "(?:^|[\\s`(])(?:(?:kb-hub[/\\\\])?kb[/\\\\])?auth\\.md(?=[\\s`),.;:]|$)"
            mustNotContain:
              - "\\baccess tokens?\\b"
              - "\\b(?:JWT|opaque tokens?|signing algorithms?|key management|token format|validation logic|rotation mechan\\w*|error handling|token scopes?|permissions?|server-side|client-side)\\b"
        - type: javascript
          value: file://assertions/judge.ts
          config:
            criteria:
              - id: no-fabrication
                text: >-
                  The answer states only the module's facts: authentication uses signed session
                  tokens issued at login and verified on each request; tokens expire after 24
                  hours; refresh tokens rotate on use. A compact coverage label is allowed. The
                  cited concept path must be the existing auth.md (optionally kb/auth.md or
                  kb-hub/kb/auth.md), not an invented directory such as concepts/auth.md.
