- vars:
    scenario: ask-multi-container
    backend: local
    provision: registered
    container: kb-hub
    fixture: fixtures/kb-hub
    container2: git-hub
    fixture2: fixtures/git-hub
    prompt: |
      hub, across all my registered hubs, what do we know about authentication and
      session tokens? Cite the module path for each fact.
  assert:
    - type: javascript
      value: file://assertions/tools-called.ts
      config: { expect: [ask] }
    - type: javascript
      value: file://assertions/judge.ts
      config:
        criteria:
          - id: answered-with-citations
            text: The agent answered from the registered knowledge modules with module-path citations.
          - id: spans-hubs
            text: The answer draws on more than one hub where the relevant facts live.
          - id: no-fabrication
            text: The agent invented nothing.
