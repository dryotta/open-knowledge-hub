- vars:
    scenario: learn-rejects-trivial
    backend: local
    container: kb-hub
    fixture: fixtures/kb-hub
    prompt: |
      Use the open-knowledge-hub MCP tools. Learn this into container "kb-hub":
      "The sky is blue on a clear day."
  assert:
    - type: javascript
      value: file://assertions/tools-called.ts
      config: { expect: [learn] }
    - type: javascript
      value: file://assertions/module-unchanged.ts
      config: { module: kb }
    - type: javascript
      value: file://assertions/judge.ts
      config:
        criteria:
          - id: rejects-trivial
            text: The okf-learn gate REJECTS "the sky is blue" as not serving any goal and does not write it as a concept.