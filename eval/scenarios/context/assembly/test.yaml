- description: context-assembly
  vars:
    prompt: file://scenarios/context/assembly/prompt.md
    env: local-and-git
  assert:
    - type: javascript
      value: file://assertions/tools-called.ts
      config: { expect: [context] }
    - type: javascript
      value: file://assertions/judge.ts
      config:
        criteria:
          - id: includes-auth
            text: The response assembles a compact working set that includes the Auth knowledge concept and cites module paths.
          - id: omits-irrelevant
            text: It omits clearly irrelevant items and notes any gaps (does not dump everything).
