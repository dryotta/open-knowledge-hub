# context flow — assemble a compact, task-relevant working set.
- config:
    - vars:
        env: local-and-git
        prompt: |
          hub, assemble the context needed to implement a secure login feature in
          container "kb-hub". This is new implementation work, not an existing
          failure investigation.
  tests:
    - description: Context - login task - compact set, cites paths
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config: { expect: [context] }
        - type: javascript
          value: file://assertions/working-set-selection.ts
          config:
            required:
              - "kb/auth\\.md"
              - "mem/2026-01-01\\.md"
              - "mem/2026-02-15\\.md"
            forbidden:
              - "engineering/testing/debugging/SKILL\\.md"
              - "tools/csv2json/README\\.md"
