# context flow — include every helpful module type (skill + tool), not just knowledge.
- config:
    - vars:
        env: local-and-git
        prompt: |
          hub, assemble a focused working set from container "kb-hub" for debugging a
          failing test that parses a CSV file. List only task-relevant skills,
          tools, or knowledge, explain why each item helps, and cite each path. Keep
          rejected files out of the selected working set. Verify relevance from
          content, not a filename or recency, cite exact file paths in bullet items,
          and put any gap summary under a separate "## Gaps" heading.
  tests:
    - description: Context - CSV debug task - includes skill and tool
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config: { expect: [context] }
        - type: javascript
          value: file://assertions/transcript.ts
          config:
            source: final-message
            mustContain:
              - "engineering/testing/debugging/SKILL\\.md"
              - "tools/csv2json/README\\.md"
              - "debug|reproduc|isolat|root.?cause"
              - "CSV|JSON|convert|inspect"
        - type: javascript
          value: file://assertions/working-set-selection.ts
          config:
            required:
              - "engineering/testing/debugging/SKILL\\.md"
              - "tools/csv2json/README\\.md"
            forbidden: ["kb[/\\\\]auth(?:\\.md)?", "mem/"]
