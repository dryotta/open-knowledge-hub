- description: context-includes-skills-tools
  prompts:
    - context-includes-skills-tools
  vars:
    scenario: context-includes-skills-tools
    backend: local
    container: kb-hub
    fixture: fixtures/kb-hub
  assert:
    - type: javascript
      value: file://assertions/tools-called.ts
      config: { expect: [context] }
    - type: javascript
      value: file://assertions/transcript.ts
      config: { mustContain: ["debugging", "csv2json"], mustNotContain: [] }
    - type: javascript
      value: file://assertions/judge.ts
      config:
        criteria:
          - id: selects-skill-and-tool
            text: The working set selects the Debugging skill and the csv2json tool, each cited by path.
          - id: one-line-why
            text: It notes one line on why each selected item matters.
          - id: no-auth-pad
            text: It does NOT pad the set with the unrelated Auth knowledge concept.
