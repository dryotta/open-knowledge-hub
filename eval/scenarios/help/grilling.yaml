# help — discover common grilling instructions through MCP resources.
- config:
    - vars:
        env: empty
        prompt: |
          hub, help me stress-test this OAuth login plan one decision at a time:
          support GitHub OAuth, keep access and refresh tokens in encrypted server-side
          sessions, validate state on the callback, rotate the session after login,
          and expire idle sessions after 24 hours.
  tests:
    - description: Help - grilling guidance - resource-backed instructions ask one decision
      assert:
        - type: javascript
          value: file://assertions/tools-called.ts
          config:
            expect:
              - name: help
            forbid:
              - name: run
                arguments: { skill: grilling }
              - add_container
              - add_module
              - sync
              - config
              - todos
        - type: javascript
          value: file://assertions/grilling-response.ts
        - type: javascript
          value: file://assertions/judge.ts
          config:
            criteria:
              - id: one-decision-topic
                text: >-
                  The response asks the user to decide exactly one coherent topic from
                  the supplied OAuth plan. A framing question and related subquestions
                  are allowed only when they can all be answered as that same decision.
                  Questions spanning independent plan decisions must fail.
