# resources/wiki/workflow.yml
# Scaffolded by Open Knowledge Hub when wiki publishing is enabled on this
# container. Do not edit by hand; disable+re-enable to refresh the pinned version.
name: OKH Wiki Publish
on:
  push:
    branches: [main]
permissions:
  contents: write
concurrency:
  group: okh-wiki
  cancel-in-progress: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx --yes open-knowledge-hub@__OKH_VERSION__ wiki publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
