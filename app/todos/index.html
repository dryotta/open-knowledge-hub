<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Open Knowledge Hub Todos</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: Canvas;
      --surface: color-mix(in srgb, Canvas 94%, CanvasText 6%);
      --surface-strong: color-mix(in srgb, Canvas 86%, CanvasText 14%);
      --text: CanvasText;
      --muted: color-mix(in srgb, CanvasText 65%, Canvas 35%);
      --border: color-mix(in srgb, CanvasText 22%, Canvas 78%);
      --accent: #356ae6;
      --accent-text: #fff;
      --danger: #b42318;
      --warning: #9a6700;
      --success: #18794e;
      background: var(--bg);
      color: var(--text);
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-width: 280px; background: var(--bg); color: var(--text); }
    button, input, select { font: inherit; }
    button, input, select {
      border: 1px solid var(--border);
      border-radius: .55rem;
      background: var(--bg);
      color: var(--text);
    }
    button { cursor: pointer; }
    button:disabled, input:disabled { cursor: not-allowed; opacity: .58; }
    :focus-visible { outline: 3px solid color-mix(in srgb, var(--accent) 70%, transparent); outline-offset: 2px; }

    .app { display: grid; gap: 1rem; padding: clamp(.75rem, 2.5vw, 1.5rem); max-width: 1100px; margin: 0 auto; }
    .app-header { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    h1 { margin: 0; font-size: clamp(1.25rem, 4vw, 1.75rem); }
    .status-message { color: var(--muted); font-size: .9rem; }
    .banner { padding: .75rem 1rem; border: 1px solid currentColor; border-radius: .65rem; }
    .banner[hidden] { display: none; }
    .banner-error { color: var(--danger); background: color-mix(in srgb, var(--danger) 8%, var(--bg)); }
    .banner-unsynced { color: var(--warning); background: color-mix(in srgb, var(--warning) 8%, var(--bg)); }
    .banner-warning { color: var(--warning); background: color-mix(in srgb, var(--warning) 6%, var(--bg)); }
    .banner-notice { color: var(--muted); background: var(--surface); }

    .filters { display: grid; gap: .8rem; padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: .8rem; }
    .status-buttons, .label-chips { display: flex; flex-wrap: wrap; gap: .45rem; }
    .status-button, .chip { padding: .45rem .7rem; }
    .status-button[aria-pressed="true"], .chip[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
    .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: .7rem; align-items: end; }
    .field { display: grid; gap: .3rem; color: var(--muted); font-size: .82rem; }
    .field input, .field select { width: 100%; min-height: 2.4rem; padding: .45rem .55rem; }
    .field-search { grid-column: span 2; }
    .clear-button { min-height: 2.4rem; padding: .45rem .75rem; }

    .todo-list { list-style: none; margin: 0; padding: 0; display: grid; gap: .65rem; }
    .todo-row { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: .75rem; padding: .9rem; border: 1px solid var(--border); border-radius: .75rem; background: var(--surface); }
    .todo-row.pending { opacity: .7; }
    .todo-check { width: 1.15rem; height: 1.15rem; margin-top: .18rem; accent-color: var(--accent); }
    .todo-main { min-width: 0; display: grid; gap: .45rem; }
    .todo-title { font-weight: 650; overflow-wrap: anywhere; }
    .todo-row.completed .todo-title { text-decoration: line-through; color: var(--muted); }
    .todo-meta { display: flex; flex-wrap: wrap; gap: .35rem .65rem; color: var(--muted); font-size: .82rem; }
    .badge { display: inline-flex; align-items: center; padding: .15rem .4rem; border-radius: 999px; background: var(--surface-strong); color: var(--text); }
    .priority-high, .priority-highest { color: var(--danger); }
    .priority-low, .priority-lowest { color: var(--success); }
    .task-warning { color: var(--warning); font-size: .82rem; }
    .empty { padding: 2rem 1rem; text-align: center; color: var(--muted); border: 1px dashed var(--border); border-radius: .75rem; }

    @media (max-width: 560px) {
      .field-search { grid-column: auto; }
      .filter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app" data-app="open-knowledge-hub-todos">
    <header class="app-header">
      <h1>Todos</h1>
      <div id="status-message" class="status-message" role="status" aria-live="polite">Waiting for todo data…</div>
    </header>
    <div id="error-banner" class="banner banner-error" role="alert" hidden></div>
    <div id="updates-banner" class="banner banner-notice" role="status" hidden></div>
    <div id="unsynced-banner" class="banner banner-unsynced" role="status" hidden></div>
    <div id="warning-banner" class="banner banner-warning" role="status" hidden></div>
    <section id="filters" class="filters" aria-label="Todo filters"></section>
    <section aria-label="Todo list">
      <ul id="todo-list" class="todo-list"></ul>
    </section>
  </main>
  <!-- APP_SCRIPT -->
</body>
</html>
